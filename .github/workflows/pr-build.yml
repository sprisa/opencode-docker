# Build the Docker image on pull requests and report its size.
name: PR build

on:
  workflow_dispatch:
  pull_request:

jobs:
  build:
    name: Build and report size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "OPENCODE_VERSION=${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          build-args: OPENCODE_VERSION=${{ steps.version.outputs.version }}
          tags: sprisa/opencode:pr-${{ github.event.number || 'manual' }}

      - name: Report image size
        run: |
          TAG="pr-${{ github.event.number || 'manual' }}"
          SIZE=$(docker images "sprisa/opencode:${TAG}" --format "{{.Size}}")
          echo "### Image size: $SIZE" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Layer | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          docker history "sprisa/opencode:${TAG}" \
            --format "| {{.CreatedSince}} | {{.Size}} |" \
            --no-trunc \
            | tail -n +2 >> "$GITHUB_STEP_SUMMARY"
          echo "built: $SIZE"
